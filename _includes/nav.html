<div class="header-inner">
	<nav aria-label="Main navigation">
		<ul>
			<li><a href="/" title="Home"><span aria-hidden="true">🪏</span> Home</a></li>
			{% for event in site.data.events.events %}
			<li><a href="{{ event.page | uri_escape }}" title="{{ event.name | escape }}">{% include event-icon.html page=event.page %}{{ event.name }}</a></li>
			{% endfor %}
		</ul>
	</nav>
</div>

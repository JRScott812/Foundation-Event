<nav class="{{ include.class | default: 'footer-social' }}" aria-label="Social links">
	{% for link in site.data.events.social %}
	<a href="{{ link.url }}" target="_blank" rel="noopener noreferrer"
		title="Follow Foundation on {{ link.name }}"><span aria-hidden="true">{{ link.icon }}</span> {{ link.name }}</a>
	{% endfor %}
</nav>
